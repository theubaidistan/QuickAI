<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0a0e14"/>
  <!-- Chip body -->
  <rect x="9" y="9" width="14" height="14" rx="2" fill="none" stroke="#63d39b" stroke-width="1.5"/>
  <!-- Center dot -->
  <rect x="13" y="13" width="6" height="6" rx="1" fill="#63d39b" opacity="0.9"/>
  <!-- Top pins -->
  <line x1="13" y1="9" x2="13" y2="6" stroke="#63d39b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="9" x2="19" y2="6" stroke="#63d39b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bottom pins -->
  <line x1="13" y1="23" x2="13" y2="26" stroke="#63d39b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="23" x2="19" y2="26" stroke="#63d39b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left pins -->
  <line x1="9" y1="13" x2="6" y2="13" stroke="#63d39b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="19" x2="6" y2="19" stroke="#63d39b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right pins -->
  <line x1="23" y1="13" x2="26" y2="13" stroke="#63d39b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="19" x2="26" y2="19" stroke="#63d39b" stroke-width="1.5" stroke-linecap="round"/>
</svg>
